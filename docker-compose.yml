version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: twine_postgres
    environment:
      POSTGRES_DB: twine_db
      POSTGRES_USER: twine_user
      POSTGRES_PASSWORD: twine_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U twine_user -d twine_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: twine_redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twine_api
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://twine_user:twine_password@postgres:5432/twine_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
