name: twine
description: A private world built for two.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # HTTP & API
  dio: ^5.3.0
  retrofit: ^4.0.0

  # WebSocket
  socket_io_client: ^2.0.3+1

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # UI & Animations
  lottie: ^2.7.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  photo_view: ^0.14.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  # Media
  audio_waveforms: ^1.0.5
  just_audio: ^0.9.35
  record: ^5.0.4

  # Utilities
  uuid: ^4.1.0
  intl: ^0.18.1
  timeago: ^3.6.0
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.1
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.0
  crypto: ^3.0.3

  # Payments
  flutter_stripe: ^9.3.0

  # Notifications

  flutter_local_notifications: ^16.3.0

  # Icons
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.0.0
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
